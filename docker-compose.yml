services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://skill_user:skill_pass@db:5432/skill_gap_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: skill_user
      POSTGRES_PASSWORD: skill_pass
      POSTGRES_DB: skill_gap_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skill_user -d skill_gap_db"]
      interval: 5s
      timeout: 5s
      retries: 10